version: "3"

vars:
  PROJECT_NAME: mail-gateway
  EXECUTABLE_NAME: mail-gateway-reader
  TAP_DIR: ../homebrew-tap

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the Swift package
    cmds:
      - swift build

  run:
    desc: Run the executable
    cmds:
      - swift run {{.EXECUTABLE_NAME}} {{.CLI_ARGS}}

  test:
    desc: Run Swift tests and smoke tests
    cmds:
      - swift test
      - swift build --target MailGatewaySwiftSmokeTests
      - .build/debug/mail-gateway-swift-smoke-tests

  clean:
    desc: Clean SwiftPM and release artifacts
    cmds:
      - rm -rf .build dist release

  lint:
    desc: Run SwiftLint when available
    cmds:
      - swiftlint

  build:homebrew:
    desc: Build standalone Homebrew formula archives for the current platform, or pass targets after --
    cmds:
      - scripts/build-homebrew-release.sh {{.CLI_ARGS}}

  homebrew:formula:
    desc: Render split Formula/*.rb files from dist/homebrew checksums
    cmds:
      - scripts/render-homebrew-formula.sh {{.CLI_ARGS}}

  homebrew:tap-formula:
    desc: Render split formulae into the default sibling Homebrew tap checkout
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:tap-formula -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-formula.sh "{{.CLI_ARGS}}" "{{.TAP_DIR}}/Formula"
